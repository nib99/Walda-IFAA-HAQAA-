<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1F12">
<meta name="robots" content="noindex, nofollow">
<title>Admin Dashboard — IFAA HAQAA</title>
<meta name="description" content="IFAA HAQAA content management dashboard.">

<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dnleeurnm/image/upload/v1780151860/IMG-20260528-WA0001_wydzn8.jpg">
<link rel="apple-touch-icon" href="https://res.cloudinary.com/dnleeurnm/image/upload/v1780151860/IMG-20260528-WA0001_wydzn8.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Tailwind CSS (utility classes used alongside admin.css design system) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Chart.js for dashboard analytics -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

<!-- ========== APP LOADER ========== -->
<div id="appLoader">
  <img src="https://res.cloudinary.com/dnleeurnm/image/upload/v1780151860/IMG-20260528-WA0001_wydzn8.jpg" alt="IFAA HAQAA">
  <div class="loader-dots"><span></span><span></span><span></span></div>
</div>

<!-- ========== LOGIN SCREEN ========== -->
<div id="loginScreen" class="hidden">
  <div class="login-card">
    <img src="https://res.cloudinary.com/dnleeurnm/image/upload/v1780151860/IMG-20260528-WA0001_wydzn8.jpg" alt="IFAA HAQAA" class="login-logo">
    <h1 class="login-title">Admin Dashboard</h1>
    <p class="login-subtitle">IFAA HAQAA · Sign in to manage your website</p>

    <div id="loginError" class="alert-box hidden" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" autocomplete="username" placeholder="admin@ifahaqa.com.et" required>
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <div class="password-field-wrap">
          <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••" required>
          <button type="button" id="togglePasswordVisibility" class="password-toggle-btn">Show</button>
        </div>
      </div>
      <div class="remember-row">
        <label><input type="checkbox" id="loginRemember" checked> Remember me</label>
        <a href="#" id="forgotPasswordLink">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
    </form>
  </div>
</div>

<!-- ========== DASHBOARD SHELL ========== -->
<div id="dashboardShell" class="hidden">

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="https://res.cloudinary.com/dnleeurnm/image/upload/v1780151860/IMG-20260528-WA0001_wydzn8.jpg" alt="IFAA HAQAA">
      <div>
        <div class="sidebar-header-title">IFAA HAQAA</div>
        <div class="sidebar-header-sub">Admin Dashboard</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav"><!-- injected by admin.js --></nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebarAvatarInitial">A</div>
        <div>
          <div id="sidebarUserName">Administrator</div>
          <div id="sidebarUserEmail">—</div>
        </div>
      </div>
      <button type="button" class="btn btn-danger btn-block" id="logoutBtn">Logout</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <button type="button" id="mobileMenuToggle" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <h2 id="pageTitle">Dashboard</h2>
      </div>
      <div class="topbar-right">
        <span>Hi, <strong id="topbarUserName">Admin</strong></span>
        <div class="topbar-avatar" id="topbarAvatarInitial">A</div>
      </div>
    </header>

    <main id="contentOutlet"><!-- injected by admin.js --></main>
  </div>
</div>

<!-- ========== TOASTS & CONFIRM DIALOG ========== -->
<div id="toastHost"></div>
<div id="confirmOverlay"></div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
