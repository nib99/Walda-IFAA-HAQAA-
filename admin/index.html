<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFAA HAQAA Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    .nav-active { @apply bg-[#1B4332] text-white shadow-inner; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-[#0a1a0d] text-green-50 min-h-screen">

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <div class="w-72 bg-[#0D1F12] border-r border-[#1e3d22] flex flex-col">
    <div class="p-6 border-b border-[#1e3d22]">
      <div class="flex items-center gap-3">
        <img src="https://res.cloudinary.com/dnleeurnm/image/upload/v1780151860/IMG-20260528-WA0001_wydzn8.jpg" class="w-12 h-12 rounded-full border-2 border-[#D4A017]" alt="Logo">
        <div>
          <div class="font-display font-bold text-2xl text-white">IFAA HAQAA</div>
          <div class="text-xs text-green-400">ADMIN DASHBOARD</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
      <button onclick="switchTab(0)" id="nav-0" class="nav-active w-full text-left flex items-center gap-3 px-5 py-4 rounded-2xl">📊 Dashboard</button>
      <button onclick="switchTab(1)" id="nav-1" class="w-full text-left flex items-center gap-3 px-5 py-4 rounded-2xl text-green-300 hover:bg-[#132918]">🌿 Products</button>
      <button onclick="switchTab(2)" id="nav-2" class="w-full text-left flex items-center gap-3 px-5 py-4 rounded-2xl text-green-300 hover:bg-[#132918]">📸 Gallery</button>
      <button onclick="switchTab(3)" id="nav-3" class="w-full text-left flex items-center gap-3 px-5 py-4 rounded-2xl text-green-300 hover:bg-[#132918]">📝 Content</button>
      <button onclick="switchTab(4)" id="nav-4" class="w-full text-left flex items-center gap-3 px-5 py-4 rounded-2xl text-green-300 hover:bg-[#132918]">📥 Inquiries</button>
      <button onclick="switchTab(5)" id="nav-5" class="w-full text-left flex items-center gap-3 px-5 py-4 rounded-2xl text-green-300 hover:bg-[#132918]">⭐ Testimonials</button>
    </nav>

    <div class="p-6 border-t border-[#1e3d22]">
      <button onclick="logout()" class="w-full py-3 rounded-2xl bg-red-950 hover:bg-red-900 text-red-400 font-medium">Logout</button>
    </div>
  </div>

  <!-- Main Area -->
  <div class="flex-1 flex flex-col">
    <header class="h-16 bg-[#0D1F12] border-b border-[#1e3d22] px-8 flex items-center justify-between">
      <h1 id="tabTitle" class="font-display font-bold text-3xl">Dashboard</h1>
      <div class="flex items-center gap-6">
        <button onclick="refreshData()" class="flex items-center gap-2 text-green-400 hover:text-white">⟳ Refresh</button>
        <a href="/" class="px-6 py-2 rounded-2xl border border-[#1e3d22] hover:bg-[#132918]">← Live Site</a>
      </div>
    </header>

    <main class="flex-1 overflow-auto p-8" id="mainContent">
      <!-- Dashboard -->
      <div id="tab-0-content">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
          <div class="bg-[#132918] p-6 rounded-3xl border border-[#1e3d22] card">
            <p class="text-green-400">Products</p>
            <p id="stat-products" class="text-5xl font-display font-bold text-white mt-2">12</p>
          </div>
          <div class="bg-[#132918] p-6 rounded-3xl border border-[#1e3d22] card">
            <p class="text-green-400">Gallery Images</p>
            <p id="stat-gallery" class="text-5xl font-display font-bold text-white mt-2">28</p>
          </div>
          <div class="bg-[#132918] p-6 rounded-3xl border border-[#1e3d22] card">
            <p class="text-green-400">Inquiries</p>
            <p id="stat-inquiries" class="text-5xl font-display font-bold text-white mt-2">19</p>
          </div>
          <div class="bg-[#132918] p-6 rounded-3xl border border-[#1e3d22] card">
            <p class="text-green-400">Shareholders</p>
            <p id="stat-shareholders" class="text-5xl font-display font-bold text-[#D4A017] mt-2">65</p>
          </div>
        </div>
        <div class="bg-[#132918] rounded-3xl p-6">
          <h3 class="font-semibold mb-4">Inquiry Trend</h3>
          <canvas id="mainChart" height="120"></canvas>
        </div>
      </div>

      <!-- Products Tab -->
      <div id="tab-1-content" class="hidden">
        <div class="bg-[#132918] rounded-3xl p-8">
          <h2 class="font-display text-2xl mb-6">Products Management</h2>
          <div class="grid md:grid-cols-2 gap-8">
            <!-- Add/Edit Form -->
            <div>
              <input id="prodName" placeholder="Product Name" class="w-full mb-4 px-5 py-4 rounded-2xl bg-[#0D1F12] border border-[#1e3d22]">
              <textarea id="prodDesc" rows="4" placeholder="Description" class="w-full mb-4 px-5 py-4 rounded-2xl bg-[#0D1F12] border border-[#1e3d22]"></textarea>
              <input id="prodImg" placeholder="Image URL (after upload)" class="w-full mb-4 px-5 py-4 rounded-2xl bg-[#0D1F12] border border-[#1e3d22]">
              <button onclick="uploadToCloudinary()" class="w-full mb-4 py-4 bg-blue-600 rounded-2xl font-medium">📤 Upload Image to Cloudinary</button>
              <button onclick="saveProduct()" class="w-full py-4 bg-gradient-to-r from-[#D4A017] to-[#92650a] rounded-2xl font-bold">Save Product</button>
            </div>
            <!-- Product List -->
            <div id="productList" class="space-y-4 max-h-[600px] overflow-y-auto"></div>
          </div>
        </div>
      </div>

      <!-- Gallery Tab -->
      <div id="tab-2-content" class="hidden">
        <div class="bg-[#132918] rounded-3xl p-8">
          <h2 class="font-display text-2xl mb-6">Gallery Management</h2>
          <button onclick="uploadToCloudinary(true)" class="mb-6 px-8 py-4 bg-gradient-to-r from-[#D4A017] to-[#92650a] rounded-2xl font-bold">+ Upload New Gallery Image</button>
          <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
      </div>

      <!-- Content Tab (Vision, Mission, Contact) -->
      <div id="tab-3-content" class="hidden">
        <div class="bg-[#132918] rounded-3xl p-8 space-y-8">
          <div>
            <h3 class="font-semibold mb-3">Vision</h3>
            <textarea id="visionText" rows="4" class="w-full px-5 py-4 rounded-2xl bg-[#0D1F12] border border-[#1e3d22]"></textarea>
          </div>
          <div>
            <h3 class="font-semibold mb-3">Mission</h3>
            <textarea id="missionText" rows="4" class="w-full px-5 py-4 rounded-2xl bg-[#0D1F12] border border-[#1e3d22]"></textarea>
          </div>
          <div>
            <h3 class="font-semibold mb-3">Contact Information</h3>
            <input id="contactPhone" placeholder="Phone" class="w-full mb-3 px-5 py-4 rounded-2xl bg-[#0D1F12]">
            <input id="contactEmail" placeholder="Email" class="w-full mb-6 px-5 py-4 rounded-2xl bg-[#0D1F12]">
            <button onclick="saveContent()" class="px-10 py-4 bg-gradient-to-r from-[#D4A017] to-[#92650a] rounded-2xl font-bold">Save All Changes</button>
          </div>
        </div>
      </div>

      <!-- Other tabs (Inquiries, Testimonials) -->
      <div id="tab-4-content" class="hidden">Inquiries Table Coming Soon...</div>
      <div id="tab-5-content" class="hidden">Testimonials Management Coming Soon...</div>
    </main>
  </div>
</div>

<script>
// Tailwind config
tailwind.config = { content: [], theme: { extend: { colors: { gold: '#D4A017' }}}} ;

// Tab Switching
function switchTab(n) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById(`tab-${n}-content`).classList.remove('hidden');
  
  document.querySelectorAll('button[id^="nav-"]').forEach((btn, i) => {
    btn.classList.toggle('nav-active', i === n);
  });
  
  document.getElementById('tabTitle').textContent = ['Dashboard','Products','Gallery','Content','Inquiries','Testimonials'][n];
}

// Cloudinary Upload (Direct Upload Widget)
function uploadToCloudinary(isGallery = false) {
  const widget = window.cloudinary.createUploadWidget({
    cloudName: 'dnleeurnm',  // ← Change to your Cloudinary cloud name
    uploadPreset: 'your_preset_name'  // Create a preset in Cloudinary dashboard
  }, (error, result) => {
    if (!error && result && result.event === "success") {
      const url = result.info.secure_url;
      if (isGallery) {
        addToGallery(url);
      } else {
        document.getElementById('prodImg').value = url;
        alert("Image uploaded! URL copied to form.");
      }
    }
  });
  widget.open();
}

// Save Product
function saveProduct() {
  const name = document.getElementById('prodName').value;
  const desc = document.getElementById('prodDesc').value;
  const img = document.getElementById('prodImg').value;
  if (!name) return alert("Name is required");
  
  // TODO: Save to Firebase / localStorage
  alert(`Product Saved: ${name}`);
  loadProducts(); // Refresh list
}

// Fake data for demo
function loadProducts() {
  const container = document.getElementById('productList');
  container.innerHTML = `
    <div class="bg-[#0D1F12] p-4 rounded-2xl">Jimaa Dimaa - <span class="text-green-400">Active</span></div>
    <div class="bg-[#0D1F12] p-4 rounded-2xl">Buna Keelloo - <span class="text-green-400">Active</span></div>
  `;
}

function addToGallery(url) {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML += `
    <div class="relative rounded-2xl overflow-hidden">
      <img src="${url}" class="w-full h-40 object-cover">
      <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 bg-red-600 text-white text-xs px-2 py-1 rounded">×</button>
    </div>`;
}

// Save Content
function saveContent() {
  alert("✅ Vision, Mission & Contact Information Saved!");
}

// Chart
let chart;
function initChart() {
  const ctx = document.getElementById('mainChart');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Jan','Feb','Mar','Apr','May','Jun'],
      datasets: [{ label: 'Inquiries', data: [12,19,25,31,28,45], borderColor: '#D4A017', tension: 0.4 }]
    },
    options: { responsive: true, plugins: { legend: { display: false }}}
  });
}

function refreshData() {
  alert("✅ Dashboard Refreshed");
}

function logout() {
  if (confirm("Logout?")) window.location.href = "/";
}

// Init
window.onload = () => {
  initChart();
  switchTab(0);
  loadProducts();
};
</script>

<!-- Cloudinary Widget Script -->
<script src="https://upload-widget.cloudinary.com/global/all.js"></script>
</body>
</html>
